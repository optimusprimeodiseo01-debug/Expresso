name: tapiz-engine

on:
  issues:
    types: [opened]
  pull_request:

jobs:
  tapiz:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: procesar idea
        run: |
          TEXT=$(cat $GITHUB_EVENT_PATH)
          HASH=$(echo "$TEXT" | sha256sum | cut -d ' ' -f1)

          echo "idea=$HASH"

          if ! echo "$TEXT" | grep -q "ref:"; then
            echo "rechazado: sin referencias"
            exit 1
          fi

      - name: señal cerebro
        run: echo "idea priorizada"
